name: shellcheck

on:
  push:
    branches: [ main ]
  pull_request:

permissions:
  contents: read

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Lint shell scripts
        run: shellcheck -x --shell=bash bin/ses-led-control install.sh tests/*.sh

      - name: Run offline parity self-test
        run: bash tests/dry-run-parity.sh
